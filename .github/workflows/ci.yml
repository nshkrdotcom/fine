name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "v*.*"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MIX_ENV: test

jobs:
  guardrails:
    name: Guardrails
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Enforce SHA-pinned actions
        run: ./scripts/ci/check_action_pinning.sh

      - name: Enforce TDD/RGR change policy
        run: ./scripts/ci/enforce_tdd_rgr.sh

  lint:
    name: Lint
    needs: guardrails
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9
        with:
          otp-version: "27.2"
          elixir-version: "1.18.2"

      - run: mix deps.get --check-locked
      - run: mix deps.compile
      - run: mix format --check-formatted
      - run: mix deps.unlock --check-unused
      - run: mix compile --warnings-as-errors

      - run: mix deps.get --check-locked
        working-directory: test

      - run: mix deps.get --check-locked
        working-directory: example
      - run: mix format --check-formatted
        working-directory: example

  test:
    name: Test (${{ matrix.os.name }}, Elixir ${{ matrix.pair.elixir }}, OTP ${{ matrix.pair.otp }})
    needs: guardrails
    runs-on: ${{ matrix.os.id }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: "Linux", id: "ubuntu-24.04" }
          - { name: "Windows", id: "windows-2022" }
          - { name: "macOS", id: "macos-14" }
        pair:
          - { elixir: "1.15.8", otp: "25.3" }
          - { elixir: "1.18.2", otp: "27.2" }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9
        with:
          otp-version: ${{ matrix.pair.otp }}
          elixir-version: ${{ matrix.pair.elixir }}

      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        if: runner.os == 'Windows'

      - run: mix deps.get --check-locked
        working-directory: test
      - run: mix test --warnings-as-errors
        working-directory: test

      - run: mix deps.get --check-locked
        working-directory: example
      - run: mix test --warnings-as-errors
        working-directory: example

  sanitizers:
    name: Sanitizers (Linux)
    needs: guardrails
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      EXTRA_CPPFLAGS: -fsanitize=undefined -fno-omit-frame-pointer
      UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9
        with:
          otp-version: "27.2"
          elixir-version: "1.18.2"

      - run: mix deps.get --check-locked
        working-directory: test
      - run: mix test --warnings-as-errors
        working-directory: test

  dependency-audit:
    name: Dependency Audit
    needs: guardrails
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: erlef/setup-beam@e6d7c94229049569db56a7ad5a540c051a010af9
        with:
          otp-version: "27.2"
          elixir-version: "1.18.2"

      - run: MIX_ENV=dev mix deps.get --check-locked
      - run: MIX_ENV=dev mix hex.audit

      - run: mix deps.get --check-locked
        working-directory: test
      - run: mix hex.audit
        working-directory: test

      - run: mix deps.get --check-locked
        working-directory: example
      - run: mix hex.audit
        working-directory: example
